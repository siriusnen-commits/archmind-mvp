name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Node 20 deprecation 대응: node24-compatible action versions
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test
        shell: bash
        run: |
          set -uo pipefail
          # Keep diagnostics under workspace so later steps (artifact upload) use the same absolute base path.
          LOG_DIR="${GITHUB_WORKSPACE}/.ci-logs"
          mkdir -p "${LOG_DIR}"

          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}" | tee "${LOG_DIR}/env.txt"
          pwd | tee -a "${LOG_DIR}/env.txt"
          ls -la "${GITHUB_WORKSPACE}" | tee "${LOG_DIR}/workspace-ls.txt" || true

          echo "pwd=$(pwd)" | tee -a "${LOG_DIR}/env.txt"
          python --version | tee -a "${LOG_DIR}/env.txt"
          which python | tee -a "${LOG_DIR}/env.txt"
          ls -la | tee "${LOG_DIR}/root-ls.txt" || true
          ls -la src | tee "${LOG_DIR}/src-ls.txt" || true
          ls -la tests | tee "${LOG_DIR}/tests-ls.txt" || true
          git status --short | tee "${LOG_DIR}/git-status.txt" || true
          python -m pip list > "${LOG_DIR}/pip-list.txt" 2>&1 || true

          echo "starting pytest"
          python -m pytest -vv -rA --maxfail=1 2>&1 | tee "${LOG_DIR}/pytest.log"
          test_exit=${PIPESTATUS[0]}

          echo "pytest_exit=${test_exit}" | tee "${LOG_DIR}/result.txt"

          echo "===== LAST 200 LINES OF PYTEST LOG ====="
          tail -n 200 "${LOG_DIR}/pytest.log" || true

          exit ${test_exit}
      - name: Dump pytest log on failure
        if: failure()
        shell: bash
        run: |
          LOG_DIR="${GITHUB_WORKSPACE}/.ci-logs"
          echo "===== DUMP PYTEST LOG ====="
          cat "${LOG_DIR}/pytest.log" || true
          echo "===== DUMP ENV ====="
          cat "${LOG_DIR}/env.txt" || true
          echo "===== DUMP RESULT ====="
          cat "${LOG_DIR}/result.txt" || true
      - name: Upload CI test logs artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ci-test-logs
          path: ${{ github.workspace }}/.ci-logs
          if-no-files-found: warn
