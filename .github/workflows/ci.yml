name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Node 20 deprecation 대응: node24-compatible action versions
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Preflight
        shell: bash
        run: |
          set -euxo pipefail
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          pwd
          ls -la
          ls -la "${GITHUB_WORKSPACE}"
      - name: Create diagnostics dir
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/.ci-logs"
          echo "created" > "${GITHUB_WORKSPACE}/.ci-logs/_created.txt"
          ls -la "${GITHUB_WORKSPACE}/.ci-logs"
      - name: Python diagnostics
        shell: bash
        run: |
          set -euxo pipefail
          python --version | tee "${GITHUB_WORKSPACE}/.ci-logs/env.txt"
          which python | tee -a "${GITHUB_WORKSPACE}/.ci-logs/env.txt"
          git status --short | tee "${GITHUB_WORKSPACE}/.ci-logs/git-status.txt" || true
          python -m pip list > "${GITHUB_WORKSPACE}/.ci-logs/pip-list.txt" 2>&1 || true
          ls -la tests | tee "${GITHUB_WORKSPACE}/.ci-logs/tests-ls.txt" || true
          ls -la src | tee "${GITHUB_WORKSPACE}/.ci-logs/src-ls.txt" || true
      - name: Run pytest
        shell: bash
        run: |
          set -uo pipefail
          echo "starting pytest" | tee "${GITHUB_WORKSPACE}/.ci-logs/result.txt"
          python -m pytest -vv -rA --maxfail=1 2>&1 | tee "${GITHUB_WORKSPACE}/.ci-logs/pytest.log"
          test_exit=${PIPESTATUS[0]}
          echo "pytest_exit=${test_exit}" | tee -a "${GITHUB_WORKSPACE}/.ci-logs/result.txt"
          tail -n 200 "${GITHUB_WORKSPACE}/.ci-logs/pytest.log" || true
          exit ${test_exit}
      - name: Dump diagnostics on failure
        if: failure()
        shell: bash
        run: |
          echo "===== WORKSPACE ====="
          echo "${GITHUB_WORKSPACE}"
          echo "===== LOG DIR ====="
          ls -la "${GITHUB_WORKSPACE}/.ci-logs" || true
          echo "===== RESULT ====="
          cat "${GITHUB_WORKSPACE}/.ci-logs/result.txt" || true
          echo "===== PYTEST LOG ====="
          cat "${GITHUB_WORKSPACE}/.ci-logs/pytest.log" || true
          echo "===== ENV ====="
          cat "${GITHUB_WORKSPACE}/.ci-logs/env.txt" || true
      - name: Check diagnostics existence
        if: always()
        id: ci_logs_check
        shell: bash
        run: |
          if [ -d "${GITHUB_WORKSPACE}/.ci-logs" ] && find "${GITHUB_WORKSPACE}/.ci-logs" -type f | grep -q .; then
            echo "has_logs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_logs=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload diagnostics artifact
        if: always() && steps.ci_logs_check.outputs.has_logs == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: ci-test-logs
          path: ${{ github.workspace }}/.ci-logs
