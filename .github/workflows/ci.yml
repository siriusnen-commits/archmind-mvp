name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Node 20 deprecation 대응: node24-compatible action versions
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p .ci-logs

          echo "pwd=$(pwd)" | tee .ci-logs/env.txt
          python --version | tee -a .ci-logs/env.txt
          which python | tee -a .ci-logs/env.txt
          ls -la | tee .ci-logs/root-ls.txt || true
          ls -la src | tee .ci-logs/src-ls.txt || true
          ls -la tests | tee .ci-logs/tests-ls.txt || true
          git status --short | tee .ci-logs/git-status.txt || true
          python -m pip list > .ci-logs/pip-list.txt 2>&1 || true

          echo "starting pytest"
          python -m pytest -vv -rA --maxfail=1 2>&1 | tee .ci-logs/pytest.log
          test_exit=${PIPESTATUS[0]}

          echo "pytest_exit=${test_exit}" | tee .ci-logs/result.txt

          echo "===== LAST 200 LINES OF PYTEST LOG ====="
          tail -n 200 .ci-logs/pytest.log || true

          exit ${test_exit}
      - name: Dump pytest log on failure
        if: failure()
        shell: bash
        run: |
          echo "===== DUMP PYTEST LOG ====="
          cat .ci-logs/pytest.log || true
          echo "===== DUMP ENV ====="
          cat .ci-logs/env.txt || true
          echo "===== DUMP RESULT ====="
          cat .ci-logs/result.txt || true
      - name: Upload CI test logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-logs
          path: .ci-logs
