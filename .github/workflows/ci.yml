name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Node 20 deprecation 대응: node24-compatible action versions
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test
        shell: bash
        run: |
          set -euxo pipefail
          pwd
          python --version
          which python
          ls -la
          ls -la src || echo "src not found"
          ls -la tests || echo "tests not found"
          git status --short || true
          python -m pip list | grep -i pytest || true
          echo "starting pytest"
          python -m pytest -vv -rA --maxfail=1
