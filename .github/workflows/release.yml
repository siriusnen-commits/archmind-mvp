name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Show Python version
        run: python --version
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -q
      - name: Show release info
        run: |
          echo "release validation workflow"
          echo "tag=${GITHUB_REF_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "sha=${GITHUB_SHA}"
